name: Automated Software Release
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: 🏷️ Generate Cloud Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   
      packages: write   
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Versioned Image
        run: |
          VERSION=${{ github.ref_name }}
          docker build -t ghcr.io/${{ github.repository }}:$VERSION .
          docker build -t ghcr.io/${{ github.repository }}:latest .
          docker push ghcr.io/${{ github.repository }}:$VERSION
          docker push ghcr.io/${{ github.repository }}:latest

      - name: Generate Changelog Markdown
        uses: orhun/git-cliff-action@v2
        id: changelog
        with:
          args: --latest --strip header

      - name: Create Official GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          tag_name: ${{ github.ref_name }}