name: CI/CD — DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 0. SECRET DETECTION ──────────────────────────────────────────────────
  gitleaks:
    name: 🔐 Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 1. QUALITY & SECURITY AUDIT ──────────────────────────────────────────
  lint:
    name: 🔍 Quality & Style Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Verify Code Structure (ESLint)
        run: npm run lint
      - name: Verify Layout Styling (Prettier)
        run: npm run format:check
      - name: Audit Dependencies (npm audit)
        # Fail on HIGH or CRITICAL — LOW/MODERATE tolerated in dev deps
        run: npm audit --audit-level=high

  # ── 2. TESTS ─────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: [ lint, gitleaks ]
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm test

  # ── 3. DOCKER BUILD & PUSH ───────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [ test ]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Set lowercase image name
        run: echo "FULL_IMAGE=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Login sur GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extraire les métadonnées
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FULL_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
      - name: Build & Push l'image Docker
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. IMAGE SECURITY SCAN (TRIVY) ───────────────────────────────────────
  security:
    name: 🛡️ Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [ docker ]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Set lowercase image name
        run: echo "FULL_IMAGE=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Login sur GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Trivy — Generate SARIF report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.FULL_IMAGE }}:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'
      - name: Upload SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      - name: Trivy — Enforce security gate (table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.FULL_IMAGE }}:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'

  # ── 5. STAGING ───────────────────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [ security ]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Préparer le déploiement Staging
        run: |
          echo "Code packagé validé. Déploiement automatique sur l'environnement Staging..."
          echo "Mise à jour de l'environnement de pré-production effectuée."

  # ── 6. PRODUCTION ────────────────────────────────────────────────────────
  deploy-production:
    name: 🌐 Deploy to Production
    runs-on: ubuntu-latest
    needs: [ deploy-staging ]
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Start deployment tracking
        uses: bobheadxi/deployments@v1
        id: deployment
        with:
          step: start
          token: ${{ secrets.GITHUB_TOKEN }}
          env: production

      - name: Déclencher la mise en ligne sur Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK not configured — skipping deploy trigger"
            exit 0
          fi
          echo "Déclenchement du déploiement Render..."
          curl --fail -X POST "$RENDER_DEPLOY_HOOK"

      - name: Vérification Post-Déploiement (Health Check)
        continue-on-error: true
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Render not configured — skipping health check"
            exit 0
          fi
          echo "Attente de l'initialisation du conteneur cloud..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://mon-premier-cicd-zr1i.onrender.com/health)
            echo "Attempt $i — HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "Health check passed!" && exit 0
            sleep 20
          done
          echo "Health check failed after 10 attempts"
          exit 1

      - name: Update deployment status
        uses: bobheadxi/deployments@v1
        if: always()
        with:
          step: finish
          token: ${{ secrets.GITHUB_TOKEN }}
          status: ${{ job.status }}
          env: ${{ steps.deployment.outputs.env }}
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
          env_url: https://mon-premier-cicd-zr1i.onrender.com

  # ── 7. NOTIFICATIONS ─────────────────────────────────────────────────────
  notify-failure:
    name: 🔴 Notify Failure (Slack)
    runs-on: ubuntu-latest
    needs: [ gitleaks, lint, test, docker, security, deploy-staging, deploy-production ]
    if: always() && contains(needs.*.result, 'failure')
    steps:
      - name: Send Slack failure notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured — skipping notification"
            exit 0
          fi
          SHORT_SHA="${GITHUB_SHA:0:7}"
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg sha "$SHORT_SHA" \
            --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              "text": ":red_circle: *Pipeline FAILED* sur `\($repo)`",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": ":red_circle: Pipeline FAILED", "emoji": true }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository:*\n`\($repo)`" },
                    { "type": "mrkdwn", "text": "*Branch:*\n`\($branch)`" },
                    { "type": "mrkdwn", "text": "*Commit:*\n`\($sha)`" },
                    { "type": "mrkdwn", "text": "*Logs:*\n<\($url)|Voir les logs>" }
                  ]
                }
              ]
            }' | curl -s -X POST -H 'Content-type: application/json' -d @- "$SLACK_WEBHOOK_URL"

  notify-success:
    name: ✅ Notify Success (Slack)
    runs-on: ubuntu-latest
    needs: [ deploy-production ]
    if: success() && github.ref == 'refs/heads/main'
    steps:
      - name: Send Slack success notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured — skipping notification"
            exit 0
          fi
          SHORT_SHA="${GITHUB_SHA:0:7}"
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg sha "$SHORT_SHA" \
            --arg app_url "https://mon-premier-cicd-zr1i.onrender.com" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              "text": ":white_check_mark: *Déploiement réussi* sur `\($repo)`",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": ":white_check_mark: Déploiement en production réussi!", "emoji": true }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository:*\n`\($repo)`" },
                    { "type": "mrkdwn", "text": "*Branch:*\n`\($branch)`" },
                    { "type": "mrkdwn", "text": "*Commit:*\n`\($sha)`" },
                    { "type": "mrkdwn", "text": "*Application:*\n<\($app_url)|Voir en ligne>" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "Voir l application", "emoji": true },
                      "url": $app_url,
                      "style": "primary"
                    },
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "Logs du pipeline", "emoji": true },
                      "url": $run_url
                    }
                  ]
                }
              ]
            }' | curl -s -X POST -H 'Content-type: application/json' -d @- "$SLACK_WEBHOOK_URL"
