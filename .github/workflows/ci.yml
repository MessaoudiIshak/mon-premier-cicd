name: CI/CD — Tests, Build & Push Docker
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── JOB 1 : Lint ─────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run lint

  # ─── JOB 2 : Tests ────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm test

  # ─── JOB 3 : Build & Push Docker ──────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login sur GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extraire les métadonnées
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
      - name: Build & Push l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── JOB 4 : Déploiement Staging ──────────────────
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [ docker ]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Préparer le déploiement Staging
        run: |
          echo "Code packagé validé. Déploiement automatique sur l'environnement Staging..."
          echo "Mise à jour de l'environnement de pré-production effectuée."

  # ─── JOB 5 : Déploiement Production ───────────────
  deploy-production:
    name: 🌐 Deploy to Production
    runs-on: ubuntu-latest
    needs: [ deploy-staging ]
    if: github.ref == 'refs/heads/main'
    environment: production # 👈 Active la protection rule d'approbation manuelle sur GitHub
    steps:
      - name: Déclencher la mise en ligne sur Render
        run: |
          echo "Validation manuelle reçue. Notification de l'infrastructure de production..."
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          
      - name: Vérification Post-Déploiement (Health Check)
        run: |
          echo "Attente de l'initialisation du conteneur cloud (30s)..."
          sleep 30
          echo "Vérification de la route de santé publique..."
          curl --fail https://mon-premier-cicd-messaoudiishak.onrender.com/health