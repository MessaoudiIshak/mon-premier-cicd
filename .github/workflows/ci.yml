name: CI/CD — Tests, Build & Push Docker
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: 🔍 Quality & Style Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Verify Code Structure (ESLint)
        run: npm run lint
      - name: Verify Layout Styling (Prettier)
        run: npm run format:check

  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: [ lint ]
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm test

  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [ test ]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Set lowercase image name
        run: echo "FULL_IMAGE=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Login sur GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extraire les métadonnées
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FULL_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
      - name: Build & Push l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [ docker ]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Préparer le déploiement Staging
        run: |
          echo "Code packagé validé. Déploiement automatique sur l'environnement Staging..."
          echo "Mise à jour de l'environnement de pré-production effectuée."

  deploy-production:
    name: 🌐 Deploy to Production
    runs-on: ubuntu-latest
    needs: [ deploy-staging ]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Déclencher la mise en ligne sur Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK not configured — skipping deploy trigger"
            exit 0
          fi
          echo "Déclenchement du déploiement Render..."
          curl --fail -X POST "$RENDER_DEPLOY_HOOK"

      - name: Vérification Post-Déploiement (Health Check)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Render not configured — skipping health check"
            exit 0
          fi
          echo "Attente de l'initialisation du conteneur cloud..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://mon-premier-cicd-messaoudiishak.onrender.com/health)
            echo "Attempt $i — HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "Health check passed!" && exit 0
            sleep 20
          done
          echo "Health check failed after 10 attempts"
          exit 1