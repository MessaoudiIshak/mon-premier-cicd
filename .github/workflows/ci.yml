name: CI — Lint, Tests & Coverage
on:
  push:
    branches: [ main, 'feature/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
# ─── JOB 1 : Lint ───────────────────────────────
  lint:
    name: 🔍 Lint ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Installation des dépendances
        run: npm ci
      - name: Vérification ESLint
        run: npm run lint

# ─── JOB 2 : Tests avec matrice ─────────────────
  test:
    name: 🧪 Tests Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Installation des dépendances
        run: npm ci
      - name: Tests unitaires + couverture
        run: npm run test:ci

      # 📊 Étape insérée ici : Résumé de couverture direct dans les logs
      - name: Résumé de couverture
        if: always()
        run: |
          echo '## 📊 Couverture de code — Node ${{ matrix.node-version }}' >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            cat coverage/coverage-summary.json | node -e "
              const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              const t = data.total;
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Statements | ' + t.statements.pct + '% |');
              console.log('| Branches | ' + t.branches.pct + '% |');
              console.log('| Functions | ' + t.functions.pct + '% |');
              console.log('| Lines | ' + t.lines.pct + '% |');
            " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 14

# ─── JOB 3 : Résumé final ────────────────────────
  ci-success:
    name: ✅ CI complet
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    if: always()
    steps:
      - name: Vérifier que tout est vert
        run: |
          if [ '${{ needs.lint.result }}' != 'success' ]; then
            echo 'Lint a échoué !'
            exit 1
          fi
          if [ '${{ needs.test.result }}' != 'success' ]; then
            echo 'Tests ont échoué !'
            exit 1
          fi
          echo 'CI entièrement vert ✓'